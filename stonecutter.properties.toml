# Mod metadata + per-version dependencies. See https://stonecutter.kikugie.dev/wiki/config/properties
mod.id = "megclientmod"
mod.name = "MEG Client Mod"
mod.group = "net.gensokyoreimagined"
mod.version = "1.1.0"

deps.fabric_loader = "0.19.3"
loomx.loom_version = "1.17-SNAPSHOT"

# One jar covers the whole 1.21.x line on Fabric (stable intermediary names). NeoForge runs on
# Mojang official names, which renamed a class at 1.21.11, so its build targets the latest 1.21.x.
["1.21.x"]
mod.mc_label = "1.21.x"
mod.mc_releases = ["1.21", "1.21.1", "1.21.2", "1.21.3", "1.21.4", "1.21.5", "1.21.6", "1.21.7", "1.21.8", "1.21.9", "1.21.10", "1.21.11"]

[fabric."1.21.x"]
mod.mc_compat = ">=1.21 <26"
deps.fabric_api = "0.141.4+1.21.11"

[neoforge."1.21.x"]
mod.mc_compat = "[1.21.11, 26)"
deps.neo_loader = "21.11.42"

# 26.x: unobfuscated, identical API across 26.1 and 26.2, so one jar covers both.
["26.x"]
mod.mc_label = "26.x"
mod.mc_releases = ["26.1", "26.1.1", "26.1.2", "26.2"]

[fabric."26.x"]
mod.mc_compat = ">=26.1"
deps.fabric_api = "0.152.1+26.1.2"

[neoforge."26.x"]
mod.mc_compat = "[26.1,)"
deps.neo_loader = "26.1.2.43-beta"
